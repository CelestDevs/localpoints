name: Deploy da Worker (Cloudflare)

# Workflow separado do deploy.yml (que cuida da hospedagem no Firebase).
# Só roda quando algo em cloudflare-worker/ muda.

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy da Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
